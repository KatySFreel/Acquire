<section class="@sectionClass">
  @include('header.html')

  <div class="offer__wrapper">

    @if (typeof mediaType !== 'undefined') {
      @if (mediaType === 'image' && typeof imgAlt) {
      <picture class="offer__picture">
        <!-- AVIF -->
        <source srcset="@img-md.avif" media="(max-width: 390px)" type="image/avif">
        <source srcset="@img-lg.avif" media="(max-width: 1024px)" type="image/avif">
        <source srcset="@img-xl.avif" type="image/avif">

        <!-- WEBP -->
        <source srcset="@img-md.webp" media="(max-width: 390px)" type="image/webp">
        <source srcset="@img-lg.webp" media="(max-width: 1024px)" type="image/webp">
        <source srcset="@img-xl.webp" type="image/webp">

        <!-- JPG fallback -->
        <source srcset="@img-md.jpg" media="(max-width: 390px)">
        <source srcset="@img-lg.jpg" media="(max-width: 1024px)">
        <img src="@img-xl.jpg" alt="@imgAlt">
      </picture>
      }

      @if (mediaType === 'video' && typeof videoSrcMp4 !== 'undefined' && videoSrcMp4) {
      <div class="offer__bg">
        <video class="offer__video" autoplay muted loop playsinline preload="auto">
          <source src="@videoSrcWebm" type="video/webm">
          <source src="@videoSrcMp4" type="video/mp4">
        </video>
      </div>
      }
    }

    <div class="offer__container">
      @if (typeof text !== 'undefined' && text) {
      <p class="offer__text">@text</p>
      }

      <h1 class="offer__title">@title</h1>
    </div>

    <div class="custom-cursor" aria-hidden="true"></div>
  </div>
</section>
