<section class="contact-cta" id="form">
  <div class="contact-cta__bg">
    <video
        class="contact-cta__video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
    >
      <source src="video/form-video.mp4" type="video/mp4">
    </video>
  </div>

  <div class="contact-cta__overlay"></div>

  <div class="container">
    <div class="contact-cta__inner">
      <div class="contact-cta__slogan">
        <p class="contact-cta__slogan-text">
          We Drive
          <span class="contact-cta__words">
                <span class="contact-cta__words-inner">
                  <span class="contact-cta__word">Revenue</span>
                  <span class="contact-cta__word">Growth</span>
                  <span class="contact-cta__word">Performance</span>
                  <span class="contact-cta__word">Results</span>
                </span>
              </span>
        </p>
      </div>

      <div class="contact-cta__content">
        <h2 class="contact-cta__title h2">Get in touch</h2>

        <div class="contact-cta__text">
          <p>
            If you're interested in taking your business to the next level, get in touch with us and our experts will contact you.
          </p>
        </div>

        <form class="contact-form" action="#" method="post">
          <div class="contact-form__grid">
            <label class="contact-form__field">
              <span class="contact-form__label">First Name*</span>
              <input class="input-reset" type="text" name="first_name" required>
              <span class="contact-form__error-text">This field is required</span>
            </label>

            <label class="contact-form__field">
              <span class="contact-form__label">Last Name*</span>
              <input class="input-reset" type="text" name="last_name" required>
              <span class="contact-form__error-text">This field is required</span>
            </label>

            <label class="contact-form__field">
              <span class="contact-form__label">Email*</span>
              <input class="input-reset" type="email" name="email" required>
              <span class="contact-form__error-text">Please enter a valid email</span>
            </label>

            <label class="contact-form__field">
              <span class="contact-form__label">Phone*</span>
              <input class="input-reset" type="tel" name="phone" required>
              <span class="contact-form__error-text">Please enter a valid phone number</span>
            </label>

            <label class="contact-form__field contact-form__field--full">
              <span class="contact-form__label">Website</span>
              <input class="input-reset" type="text" name="website">
              <span class="contact-form__error-text">Error text</span>
            </label>
          </div>

          <p class="contact-form__policy">
            By submitting this form you agree to our
            <a href="#">privacy policy</a>
          </p>

          <div class="contact-form__captcha"></div>

          <button class="contact-form__submit btn-arrow btn-arrow--full btn-reset" type="submit">
            Send form
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
